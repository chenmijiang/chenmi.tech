<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
  <title id="title">ChenMi workspace illustration</title>
  <desc id="desc">Stylized desk and monitor illustration used as a placeholder workspace image.</desc>
  <defs>
    <linearGradient id="wall" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3f4f6" />
      <stop offset="100%" stop-color="#dbeafe" />
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
  </defs>
  <rect width="960" height="640" rx="32" fill="url(#wall)" />
  <rect x="132" y="108" width="696" height="372" rx="24" fill="#0f172a" />
  <rect x="160" y="136" width="640" height="316" rx="14" fill="url(#screen)" />
  <rect x="424" y="480" width="112" height="36" rx="10" fill="#334155" />
